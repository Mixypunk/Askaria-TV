name: Build & Release Askaria TV

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version (ex: 1.2.0) — vide = auto depuis pubspec'
        required: false
        default: ''

jobs:
  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── Version ──────────────────────────────────────────────────────────
      # Le BUILD_NUMBER = github.run_number est TOUJOURS croissant et unique.
      # Le VERSION_NAME est lu depuis pubspec.yaml (partie avant le +),
      # ou surchargé manuellement via workflow_dispatch.
      - name: Compute version
        id: version
        run: |
          RAW=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
          PUBSPEC_NAME=$(echo "$RAW" | cut -d '+' -f 1)

          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version_name }}"
          else
            VERSION_NAME="$PUBSPEC_NAME"
          fi

          BUILD_NUMBER="${{ github.run_number }}"

          # Tag unique = jamais le même, même pour la même version sémantique
          TAG="Askaria-TV-v${VERSION_NAME}+${BUILD_NUMBER}"
          RELEASE_NAME="Askaria TV v${VERSION_NAME}"
          APK_NAME="Askaria-TV-v${VERSION_NAME}-build${BUILD_NUMBER}.apk"

          echo "version_name=$VERSION_NAME"   >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER"   >> $GITHUB_OUTPUT
          echo "tag=$TAG"                     >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME"   >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME"           >> $GITHUB_OUTPUT

      # ── Injecter la version dans pubspec.yaml avant le build ─────────────
      - name: Update pubspec version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          echo "pubspec version: $(grep '^version:' pubspec.yaml)"

      # ── Dépendances ───────────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── Build APK release ─────────────────────────────────────────────────
      - name: Build Android APK (release)
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version_name }} \
            --build-number=${{ steps.version.outputs.build_number }}

      # ── Renommer l'APK ────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          SRC="build/app/outputs/flutter-apk/app-release.apk"
          DST="build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}"
          cp "$SRC" "$DST"
          echo "APK prêt : $(du -sh $DST)"

      # ── Upload artefact de build (30 jours) ──────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      # ── Publication GitHub Release ────────────────────────────────────────
      # Chaque run crée une NOUVELLE release grâce au tag unique.
      # make_latest: true → l'app TV détecte automatiquement la dernière release.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          body: |
            ## 📺 Askaria TV — ${{ steps.version.outputs.release_name }}

            **Version :** `${{ steps.version.outputs.version_name }}` · **Build :** `${{ steps.version.outputs.build_number }}`
            **Commit :** `${{ github.event.head_commit.message }}`

            ### 📥 Installation
            1. Téléchargez l'APK ci-dessous
            2. Activez les **sources inconnues** sur votre Android TV
            3. Installez l'APK via un gestionnaire de fichiers (ex: FX File Explorer, Solid Explorer)

            ### 🔄 Mise à jour automatique
            L'application détecte et télécharge automatiquement les nouvelles versions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
