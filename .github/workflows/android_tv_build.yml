name: Build & Release Askaria TV

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version manuelle (ex: 2.1.0) — vide = 1.0.RUN_NUMBER'
        required: false
        default: ''

jobs:
  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── Version ──────────────────────────────────────────────────────────
      - name: Compute version
        id: version
        run: |
          RUN="${{ github.run_number }}"

          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION_NAME="${{ github.event.inputs.version_override }}"
          else
            VERSION_NAME="1.0.${RUN}"
          fi

          TAG="Askaria-TV-v${VERSION_NAME}"
          RELEASE_NAME="Askaria TV v${VERSION_NAME}"
          APK_NAME="Askaria-TV-v${VERSION_NAME}.apk"

          echo "version_name=$VERSION_NAME"   >> $GITHUB_OUTPUT
          echo "build_number=$RUN"            >> $GITHUB_OUTPUT
          echo "tag=$TAG"                     >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME"   >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME"           >> $GITHUB_OUTPUT

          echo "VERSION: $VERSION_NAME | BUILD: $RUN | TAG: $TAG"

      # ── Injecter la version dans pubspec.yaml ─────────────────────────────
      - name: Update pubspec version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version_name }}+${{ steps.version.outputs.build_number }}/" pubspec.yaml
          echo "pubspec → $(grep '^version:' pubspec.yaml)"

      # ── Keystore — décoder depuis les secrets GitHub ───────────────────────
      # IMPORTANT : Android refuse les MAJ si la signature change entre builds.
      # → On utilise TOUJOURS la même keystore stockée dans les secrets GitHub.
      - name: Setup release keystore
        run: |
          echo "${{ secrets.TV_KEYSTORE_BASE64 }}" | base64 --decode > android/app/askaria_tv.jks
          cat > android/key.properties << EOF
          storeFile=../app/askaria_tv.jks
          storePassword=${{ secrets.TV_STORE_PASSWORD }}
          keyAlias=${{ secrets.TV_KEY_ALIAS }}
          keyPassword=${{ secrets.TV_KEY_PASSWORD }}
          EOF
          echo "Keystore TV : $(ls -lh android/app/askaria_tv.jks)"

      # ── Dépendances ───────────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── Build APK release signé ───────────────────────────────────────────
      - name: Build Android APK (release)
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.version_name }} \
            --build-number=${{ steps.version.outputs.build_number }}

      # ── Renommer l'APK ────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          SRC="build/app/outputs/flutter-apk/app-release.apk"
          DST="build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}"
          cp "$SRC" "$DST"
          echo "APK : $(du -sh $DST)"

      # ── Upload artefact de build (30 jours) ──────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.apk_name }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          retention-days: 30

      # ── Publication GitHub Release ────────────────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          body: |
            ## 📺 ${{ steps.version.outputs.release_name }}

            **Version :** `${{ steps.version.outputs.version_name }}` · **Build :** `#${{ steps.version.outputs.build_number }}`
            **Commit :** `${{ github.event.head_commit.message }}`

            ### 📥 Installation
            1. Téléchargez **`${{ steps.version.outputs.apk_name }}`** ci-dessous
            2. Activez les **sources inconnues** sur votre Android TV
            3. Installez l'APK via un gestionnaire de fichiers (ex : FX Explorer, Solid Explorer)

            ### 🔄 Mise à jour automatique
            L'application détecte et télécharge automatiquement les nouvelles versions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
